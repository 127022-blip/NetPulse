name: NetPulse
options:
  bundleIdPrefix: com.netpulse
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_NAME: NetPulse
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  NetPulse:
    type: application
    platform: macOS
    sources:
      - path: NetPulse
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: NetPulse/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NetPulse/Resources/NetPulse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: NO
        ENABLE_USER_SELECTED_FILES: false
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - framework: CoreWLAN.framework
        embed: false
    entitlements:
      path: NetPulse/Resources/NetPulse.entitlements
    postBuildScripts:
      - name: "Rename App with Version"
        script: |
          # 读取并递增构建计数
          BUILD_NUM_FILE="${SRCROOT}/build_number.txt"
          if [ -f "$BUILD_NUM_FILE" ]; then
            BUILD_NUM=$(cat "$BUILD_NUM_FILE")
            BUILD_NUM=$((BUILD_NUM + 1))
          else
            BUILD_NUM=1
          fi
          echo "$BUILD_NUM" > "$BUILD_NUM_FILE"

          # 从 Xcode build settings 获取版本信息
          MARKETING_VERSION=$(xcodebuild -project "${PROJECT_FILE_PATH}" -target NetPulse -configuration Debug -showBuildSettings 2>/dev/null | grep "MARKETING_VERSION" | head -1 | awk '{print $3}')
          if [ -z "$MARKETING_VERSION" ]; then
            MARKETING_VERSION="1.3.0"
          fi
          PRODUCT_NAME="NetPulse"

          # 桌面路径
          DESKTOP_DIR="${HOME}/Desktop"
          mkdir -p "$DESKTOP_DIR"

          # 复制并重命名 app 到桌面（使用 ditto 替代 cp -R）
          SRC_APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          DST_APP="${DESKTOP_DIR}/${PRODUCT_NAME}-${MARKETING_VERSION}-(${BUILD_NUM}).app"

          if [ -d "$SRC_APP" ]; then
            rm -rf "$DST_APP"
            cp -Rp "$SRC_APP" "$DST_APP"
            # 重新签名
            codesign --force --sign - "$DST_APP"
            sync
            echo "✅ Created: $DST_APP"
          fi
