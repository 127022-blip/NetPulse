name: NetPulse
options:
  bundleIdPrefix: com.netpulse
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_NAME: NetPulse
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  NetPulse:
    type: application
    platform: macOS
    sources:
      - path: NetPulse
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: NetPulse/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NetPulse/Resources/NetPulse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: NO
        ENABLE_USER_SELECTED_FILES: false
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - framework: CoreWLAN.framework
        embed: false
    entitlements:
      path: NetPulse/Resources/NetPulse.entitlements
